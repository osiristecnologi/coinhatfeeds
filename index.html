<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>CoinHatFeeds</title>

<link
href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
rel="stylesheet"
/>

<link rel="stylesheet" href="style.css"/>

<!-- BOOTSTRAP -->
<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
/>

<!-- LIGHTWEIGHT CHARTS -->
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<!-- OVERLAY -->
<div
class="overlay"
id="overlay"
onclick="closeAll()">
</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">

  <div class="drawer-header">

    <div class="drawer-logo">
      ☰ coinhatfeeds
    </div>

    <button
    class="drawer-close"
    onclick="closeDrawer()">
      ✕
    </button>

  </div>

  <!-- TABS -->
  <div class="drawer-tabs" id="drawerTabs">

    <button
    class="dtab active"
    data-tab="news"
    onclick="switchDrawerTab('news',this)">

      📰
      <span id="dt-news">Notícias</span>

    </button>

    <button
    class="dtab"
    data-tab="swap"
    onclick="abrirSwapGeral(); closeDrawer();">

      🔄
      <span id="dt-swap">Swap</span>

    </button>

    <button
    class="dtab"
    data-tab="alpha"
    onclick="switchDrawerTab('alpha',this)">

      ⚡
      <span id="dt-alpha">Alpha</span>

    </button>

    <button
    class="dtab"
    data-tab="airdrops"
    onclick="switchDrawerTab('airdrops',this)">

      🎁
      <span id="dt-airdrops">Airdrops</span>

    </button>

    <button
    class="dtab"
    data-tab="sponsors"
    onclick="switchDrawerTab('sponsors',this)">

      💎
      <span id="dt-sponsors">Parceiros</span>

    </button>

  </div>

  <!-- DRAWER CONTENT -->
  <div
  class="drawer-body"
  id="drawerBody">
  </div>

</div>

<!-- HEADER -->
<header>

  <!-- LEFT -->
  <div class="header-left">

    <!-- MENU -->
    <button
    class="icon-btn"
    id="menuBtn"
    onclick="openDrawer()"
    title="Menu">

      <span class="hamburger-icon">

        <span></span>
        <span></span>
        <span></span>

      </span>

      <span
      class="notif-dot"
      id="menuDot">
      </span>

    </button>

    <!-- LOGO -->
    <div class="logo">
      coinhatfeeds
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">

      <span class="search-icon">
        🔍
      </span>

      <input
      type="text"
      id="searchInput"
      placeholder="Buscar token..."
      autocomplete="off"
      oninput="onSearch(this.value)"
      onfocus="showResults()"
      />

      <div id="search-results"></div>

    </div>

  </div>
  <!-- FECHAMENTO header-left -->

  <!-- RIGHT -->
  <div class="header-right">

    <div class="lang-dropdown">

      <button
      class="icon-btn"
      onclick="toggleLang()"
      title="Idioma">

        🌐

      </button>

      <div
      class="lang-menu"
      id="langMenu">

        <div
        class="lang-opt selected"
        onclick="setLang('pt',this)">
          🇧🇷 Português
        </div>

        <div
        class="lang-opt"
        onclick="setLang('en',this)">
          🇺🇸 English
        </div>

        <div
        class="lang-opt"
        onclick="setLang('es',this)">
          🇪🇸 Español
        </div>

      </div>

    </div>

  </div>

</header>

<!-- TICKER -->
<div class="ticker-bar">

  <div
  class="ticker-inner"
  id="tickerInner">

    <span class="ticker-item">
      Carregando cotações...
    </span>

  </div>

</div>

<!-- MAIN -->
<main>

  <div
  style="
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  ">

    <div>

      <div class="section-title">

        🔥

        <span id="nt-title">
          Memecoins em Destaque
        </span>

      </div>

      <div class="section-sub">

        <span id="nt-sub">
          Cotações e gráficos em tempo real
        </span>

        ·

        <span class="live">

          <span class="live-dot"></span>

          <span id="liveText">
            LIVE
          </span>

        </span>

      </div>

    </div>

    <!-- REFRESH -->
    <button
    onclick="loadMemecoins()"
    style="
      background:var(--blue);
      color:white;
      border:none;
      border-radius:50px;
      padding:8px 18px;
      font-family:'DM Sans',sans-serif;
      font-size:0.82rem;
      font-weight:600;
      cursor:pointer;
    ">

      ↻

      <span id="nt-refresh">
        Atualizar
      </span>

    </button>

  </div>

  <!-- GRID -->
  <div
  class="meme-grid"
  id="tokenCardsContainer">

    <div class="loading-box">
      Carregando...
    </div>

  </div>

</main>

<!-- CHAT FAB -->
<button
class="chat-fab"
onclick="toggleChat()"
id="chatFab"
title="Assistente">

  🤖

  <span
  class="fab-badge"
  id="chatBadge">
    1
  </span>

</button>

<!-- CHAT -->
<div
class="chat-window"
id="chatWindow">

  <div class="chat-head">

    <div class="chat-head-avatar">
      🤖
    </div>

    <!-- TEXTO -->
    <div>

      <div
      class="chat-head-name"
      id="botName">

        CryptoBot

      </div>

      <div
      class="chat-head-sub"
      id="botSub">

        Assistente CoinHatFeeds · online

      </div>

    </div>
    <!-- FECHAMENTO QUE FALTAVA -->

    <button
    class="chat-head-close"
    onclick="toggleChat()">

      ✕

    </button>

  </div>

  <!-- MSGS -->
  <div
  class="chat-messages"
  id="chatMessages">
  </div>

  <!-- SUGGESTIONS -->
  <div
  class="chat-suggestions"
  id="chatSugs">
  </div>

  <!-- INPUT -->
  <div class="chat-input-row">

    <input
    class="chat-input"
    id="chatInput"
    placeholder="Pergunte sobre cripto..."
    onkeydown="if(event.key==='Enter')sendChat()"
    />

    <button
    class="chat-send"
    onclick="sendChat()">

      ➤

    </button>

  </div>

</div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- APP -->
<script src="app.js?v=5"></script>

</body>
</html>
