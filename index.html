<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CoinHatFeeds</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">

  <div class="drawer-header">
    <div class="drawer-logo">☰ CoinHatFeeds</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <div class="drawer-tabs" id="drawerTabs">

    <button class="dtab active"
            data-tab="news"
            onclick="switchDrawerTab('news',this)">
      📰 <span id="dt-news">Notícias</span>
    </button>

    <button class="dtab"
            data-tab="presales"
            onclick="switchDrawerTab('presales',this)">
      🚀 <span id="dt-presales">Pré-vendas</span>
    </button>

    <button class="dtab"
            data-tab="alpha"
            onclick="switchDrawerTab('alpha',this)">
      ⚡ <span id="dt-alpha">Alpha</span>
    </button>

    <button class="dtab"
            data-tab="airdrops"
            onclick="switchDrawerTab('airdrops',this)">
      🎁 <span id="dt-airdrops">Airdrops</span>
    </button>

    <button class="dtab"
            data-tab="sponsors"
            onclick="switchDrawerTab('sponsors',this)">
      💎 <span id="dt-sponsors">Parceiros</span>
    </button>

  </div>

  <div class="drawer-body" id="drawerBody"></div>

</div>

<!-- HEADER -->
<header>

  <div class="header-left">

    <button class="icon-btn"
            id="menuBtn"
            onclick="openDrawer()"
            title="Menu">

      <span class="hamburger-icon">
        <span></span>
        <span></span>
      </span>

      <span class="notif-dot" id="menuDot"></span>

    </button>

  </div>

  <!-- SEARCH -->
  <div class="search-wrap">

    <input type="text"
           id="searchInput"
           placeholder="Buscar token ou contrato..."
           autocomplete="off"
           oninput="onSearch(this.value)"
           onfocus="showResults()"/>

    <span class="search-icon">🔍</span>

    <div id="search-results"></div>

  </div>

  <!-- RIGHT -->
  <div class="header-right">

    <div class="lang-dropdown">

      <button class="icon-btn"
              onclick="toggleLang()"
              title="Idioma">
        🌐
      </button>

      <div class="lang-menu" id="langMenu">

        <div class="lang-opt selected"
             onclick="setLang('pt',this)">
          🇧🇷 Português
        </div>

        <div class="lang-opt"
             onclick="setLang('en',this)">
          🇺🇸 English
        </div>

        <div class="lang-opt"
             onclick="setLang('es',this)">
          🇪🇸 Español
        </div>

        <div class="lang-opt"
             onclick="setLang('zh',this)">
          🇨🇳 中文
        </div>

        <div class="lang-opt"
             onclick="setLang('ja',this)">
          🇯🇵 日本語
        </div>

        <div class="lang-opt"
             onclick="setLang('ru',this)">
          🇷🇺 Русский
        </div>

      </div>

    </div>

  </div>

</header>

<!-- TICKER -->
<div class="ticker-bar">

  <div class="ticker-inner" id="tickerInner">
    <span class="ticker-item">
      Carregando cotações...
    </span>
  </div>

</div>

<!-- MAIN -->
<main>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">

    <div>

      <div class="section-title" id="nt-title">

        <img src="logo.png" alt="logo"/>

        CoinHatFeeds

      </div>

    </div>

  </div>

</main>

<!-- TOKEN MODAL -->
<div class="modal-overlay" id="tokenModal">

  <div class="modal" id="modalBox">

    <div class="modal-head">

      <img class="modal-logo"
           id="m-logo"
           src=""
           alt=""
           onerror="this.style.display='none'"/>

      <div>
        <div class="modal-name" id="m-name">—</div>
        <div class="modal-sym" id="m-sym">—</div>
      </div>

      <button class="modal-close-btn"
              onclick="closeModal()">
        ✕
      </button>

    </div>

    <div class="modal-body">

      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;">

        <div class="modal-price" id="m-price">—</div>

        <div class="meme-chg" id="m-chg">—</div>

      </div>

      <div class="modal-row">

        <div class="modal-stat">
          <label id="nt-vol">Vol 24h</label>
          <value id="m-vol">—</value>
        </div>

        <div class="modal-stat">
          <label id="nt-liq">Liquidez</label>
          <value id="m-liq">—</value>
        </div>

        <div class="modal-stat">
          <label id="nt-mc">Mkt Cap</label>
          <value id="m-mc">—</value>
        </div>

      </div>

      <div class="chart-tabs">

        <button class="chart-tab active"
                onclick="switchTab(this,'m5')"
                data-tf="m5">
          15s
        </button>

        <button class="chart-tab"
                onclick="switchTab(this,'h1')"
                data-tf="h1">
          1m
        </button>

        <button class="chart-tab"
                onclick="switchTab(this,'h6')"
                data-tf="h6">
          1h
        </button>

      </div>

      <div class="modal-chart">
        <svg id="m-chart"
             viewBox="0 0 300 100"
             preserveAspectRatio="none">
        </svg>
      </div>

      <div class="modal-contract" style="margin-top:14px;">

        <strong id="nt-contract">
          Contrato
        </strong>

        <span id="m-addr">—</span>

      </div>

      <div class="modal-links" id="m-links"></div>

      <button class="dex-toggle-btn"
              id="dexToggleBtn"
              onclick="openChartScreen()">

        📊
        <span id="dexBtnLabel">
          Ver Gráfico Avançado
        </span>

      </button>

    </div>

  </div>

</div>

<!-- CHART SCREEN -->
<div id="chartScreen"
     style="display:none;
            position:fixed;
            inset:0;
            z-index:700;
            background:#fff;
            flex-direction:column;">

  <div style="display:flex;
              align-items:center;
              gap:12px;
              padding:12px 16px;
              background:linear-gradient(135deg,#1a6bff,#0040cc);
              color:white;
              flex-shrink:0;">

    <button onclick="closeChartScreen()"
            style="background:rgba(255,255,255,0.2);
                   border:none;
                   border-radius:50%;
                   width:36px;
                   height:36px;
                   color:white;
                   font-size:1.1rem;
                   cursor:pointer;
                   display:flex;
                   align-items:center;
                   justify-content:center;">

      ←

    </button>

    <span id="chartScreenTitle"
          style="font-family:'Syne',sans-serif;
                 font-weight:700;
                 font-size:1rem;">

      Gráfico

    </span>

  </div>

  <iframe id="chartScreenFrame"
          src=""
          style="flex:1;border:none;width:100%;"
          allowfullscreen>
  </iframe>

</div>

<!-- CHAT FAB -->
<button class="chat-fab"
        onclick="toggleChat()"
        id="chatFab"
        title="Assistente cripto">

  🤖

  <span class="fab-badge" id="chatBadge">
    1
  </span>

</button>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">

  <div class="chat-head">

    <div class="chat-head-avatar">🤖</div>

    <div>

      <div class="chat-head-name" id="botName">
        CryptoBot
      </div>

      <div class="chat-head-sub" id="botSub">
        Assistente CoinHatFeeds · online
      </div>

    </div>

    <button class="chat-head-close"
            onclick="toggleChat()">
      ✕
    </button>

  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-suggestions" id="chatSugs"></div>

  <div class="chat-input-row">

    <input class="chat-input"
           id="chatInput"
           placeholder="Pergunte sobre cripto..."
           onkeydown="if(event.key==='Enter')sendChat()"/>

    <button class="chat-send"
            onclick="sendChat()">
      ➤
    </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
