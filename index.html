<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>coinhatfeeds</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════════════ OVERLAY GLOBAL ══════════════════ -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ══════════════════ MENU DRAWER ══════════════════ -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-logo">☰ coinhatfeeds</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <!-- TABS -->
  <div class="drawer-tabs" id="drawerTabs">
    <button class="dtab active" data-tab="news"     onclick="switchDrawerTab('news',this)">📰 <span id="dt-news">Notícias</span></button>
    <button class="dtab"        data-tab="presales" onclick="switchDrawerTab('presales',this)">🚀 <span id="dt-presales">Pré-vendas</span></button>
    <button class="dtab"        data-tab="alpha"    onclick="switchDrawerTab('alpha',this)">⚡ <span id="dt-alpha">Alpha</span></button>
    <button class="dtab"        data-tab="airdrops" onclick="switchDrawerTab('airdrops',this)">🎁 <span id="dt-airdrops">Airdrops</span></button>
    <button class="dtab"        data-tab="sponsors" onclick="switchDrawerTab('sponsors',this)">💎 <span id="dt-sponsors">Parceiros</span></button>
  </div>

  <!-- TAB CONTENT -->
  <div class="drawer-body" id="drawerBody">
    <!-- content rendered by JS -->
  </div>
</div>

<!-- ══════════════════ HEADER ══════════════════ -->
<header>
  <div class="header-left">
    <!-- ☰ Menu (substituiu 📰 notícias) -->
    <button class="icon-btn" id="menuBtn" onclick="openDrawer()" title="Menu">
      <span class="hamburger-icon">
        <span></span><span></span><span></span>
      </span>
      <span class="notif-dot" id="menuDot"></span>
    </button>
    <div class="logo">coinhatfeeds</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar token..." autocomplete="off"
           oninput="onSearch(this.value)" onfocus="showResults()"/>
    <div id="search-results"></div>
  </div>

  <div class="header-right">
    <div class="lang-dropdown">
      <button class="icon-btn" onclick="toggleLang()" title="Idioma">🌐</button>
      <div class="lang-menu" id="langMenu">
        <div class="lang-opt selected" onclick="setLang('pt',this)">🇧🇷 Português</div>
        <div class="lang-opt" onclick="setLang('en',this)">🇺🇸 English</div>
        <div class="lang-opt" onclick="setLang('es',this)">🇪🇸 Español</div>
        <div class="lang-opt" onclick="setLang('zh',this)">🇨🇳 中文</div>
        <div class="lang-opt" onclick="setLang('ja',this)">🇯🇵 日本語</div>
        <div class="lang-opt" onclick="setLang('ru',this)">🇷🇺 Русский</div>
      </div>
    </div>
  </div>
</header>

<!-- ══════════════════ TICKER ══════════════════ -->
<div class="ticker-bar"><div class="ticker-inner" id="tickerInner"><span class="ticker-item">Carregando cotações...</span></div></div>

<!-- ══════════════════ MAIN ══════════════════ -->

<!-- TOKEN MODAL -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <img class="modal-logo" id="m-logo" src="" alt="" onerror="this.style.display='none'"/>
      <div><div class="modal-name" id="m-name">—</div><div class="modal-sym" id="m-sym">—</div></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;">
        <div class="modal-price" id="m-price">—</div>
        <div class="meme-chg" id="m-chg">—</div>
      </div>
      <div class="modal-row">
        <div class="modal-stat"><label id="nt-vol">Vol 24h</label><value id="m-vol">—</value></div>
        <div class="modal-stat"><label id="nt-liq">Liquidez</label><value id="m-liq">—</value></div>
        <div class="modal-stat"><label id="nt-mc">Mkt Cap</label><value id="m-mc">—</value></div>
      </div>
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchTab(this,'m5')" data-tf="m5">15s</button>
        <button class="chart-tab" onclick="switchTab(this,'h1')" data-tf="h1">1m</button>
        <button class="chart-tab" onclick="switchTab(this,'h6')" data-tf="h6">1h</button>
      </div>
      <div class="modal-chart"><svg id="m-chart" viewBox="0 0 300 100" preserveAspectRatio="none"></svg></div>
      <div class="modal-contract" style="margin-top:14px"><strong id="nt-contract">Contrato</strong><span id="m-addr">—</span></div>
      <div class="modal-links" id="m-links"></div>
      <button class="dex-toggle-btn" id="dexToggleBtn" onclick="openChartScreen()">📊 <span id="dexBtnLabel">Ver Gráfico Avançado</span></button>
    </div>
  </div>
</div>

<!-- CHART FULLSCREEN -->
<div id="chartScreen" style="display:none;position:fixed;inset:0;z-index:700;background:#fff;flex-direction:column;">

</div>

</div>
